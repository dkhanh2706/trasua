{% extends "base.html" %} {% block content %}
<div class="auth-page">
  <div class="auth-card-wrapper">
    <div class="card">
      <h1>🔒 Quên mật khẩu</h1>
      <p class="tagline">Nhập email để nhận lại mật khẩu nhanh chóng.</p>
      <form
        action="{{ url_for('forgot_password') }}"
        method="post"
        class="auth-form"
      >
        <label for="email">📧 Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Nhập email đã đăng ký"
          required
        />

        <button type="submit">✉️ Gửi yêu cầu</button>
      </form>

      <div class="form-footer">
        <a href="{{ url_for('login') }}">← Quay lại đăng nhập</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% extends "base.html" %} {% block content %}
<div class="auth-page">
  <div class="auth-card-wrapper">
    <div class="card">
      <h1>🧋 Đăng nhập</h1>
      <p class="tagline">Vào ngay cửa hàng trà sữa dễ thương của bạn.</p>
      <form action="{{ url_for('login') }}" method="post" class="auth-form">
        <label for="email">📧 Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Nhập email"
          required
        />

        <label for="password">🔒 Mật khẩu</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Nhập mật khẩu"
          required
        />

        <button type="submit">Đăng nhập →</button>
      </form>

      <div class="form-footer">
        <a href="{{ url_for('register') }}">➕ Đăng ký</a>
        <a href="{{ url_for('forgot_password') }}">🔑 Quên mật khẩu?</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}

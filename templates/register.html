{% extends "base.html" %} {% block content %}
<div class="auth-page">
  <div class="auth-card-wrapper">
    <div class="card">
      <h1>✨ Đăng ký</h1>
      <p class="tagline">Tạo tài khoản để lưu đơn hàng trà sữa nhanh chóng.</p>
      <form action="{{ url_for('register') }}" method="post" class="auth-form">
        <label for="name">👤 Tên</label>
        <input type="text" id="name" name="name" placeholder="Nhập tên" required />

        <label for="email">📧 Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Nhập email"
          required
        />

        <label for="password">🔒 Mật khẩu</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Nhập mật khẩu"
          required
        />

        <label for="confirm_password">✅ Xác nhận mật khẩu</label>
        <input
          type="password"
          id="confirm_password"
          name="confirm_password"
          placeholder="Nhập lại mật khẩu"
          required
        />

        <label for="admin_code">🔑 Mã admin (nếu có)</label>
        <input
          type="text"
          id="admin_code"
          name="admin_code"
          placeholder="Nhập duykhanh để làm admin"
        />

        <button type="submit">🎉 Đăng ký</button>
      </form>

      <div class="form-footer">
        <a href="{{ url_for('login') }}">← Quay lại đăng nhập</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
